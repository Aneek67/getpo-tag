<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Curator Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-zinc-100 p-10 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-black tracking-tight text-zinc-900">Getpo Tag</h1>
            <p class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Curator Login</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5 ml-1">Username</label>
                <input required type="text" id="username" class="w-full rounded-xl border-zinc-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm py-3 px-4 transition-all" placeholder="Enter username">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5 ml-1">Password</label>
                <input required type="password" id="password" class="w-full rounded-xl border-zinc-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm py-3 px-4 transition-all" placeholder="••••••••">
            </div>
            <div id="error-msg" class="text-xs text-red-500 font-medium hidden"></div>
            <button type="submit" id="login-btn" class="w-full bg-zinc-900 text-white font-bold py-3.5 rounded-xl hover:bg-zinc-800 transition-all active:scale-[0.98] shadow-lg shadow-zinc-900/10">
                Sign In
            </button>
        </form>

        <p class="text-center text-[10px] text-zinc-400 font-medium uppercase tracking-wider">
            Access restricted to authorized curators only
        </p>
    </div>

    <script type="module">
        import { supabase } from '../supabaseClient.js';

        const form = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // SPECIAL BYPASS: If Supabase Auth is broken, use local check for staff
            if (usernameInput === 'getpotagstaff' && password === 'origincraftistheworst') {
                localStorage.setItem('staff_session', JSON.stringify({
                    user: { email: 'getpotagstaff@getpotag.com' },
                    profile: { role: 'super_admin' }
                }));
                window.location.href = 'index.html';
                return;
            }

            // Normal Auth flow for others
            const email = usernameInput.includes('@') ? usernameInput : `${usernameInput}@getpotag.com`;
            loginBtn.innerText = 'Analyzing...';
            loginBtn.disabled = true;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
                loginBtn.innerText = 'Sign In';
                loginBtn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        });

        // Redirect if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
